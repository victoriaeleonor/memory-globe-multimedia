<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Globe</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="app">
    <!-- El globo ocupa toda la pantalla -->
    <div id="globe-container"></div>

    <!-- Sidebar con lista de pins -->
    <aside id="sidebar">
      <h1>Memory Globe 🌍</h1>
      <p id="user-info"></p>
      <div id="pins-list"></div>
    </aside>

    <!-- Modal: ver recuerdo -->
    <div id="pin-modal" class="modal hidden">
      <div class="modal-content">
        <button class="close-btn" onclick="closePinModal()">✕</button>
        <img id="modal-photo" src="" alt="Foto del recuerdo" />
        <h2 id="modal-title"></h2>
        <p id="modal-desc"></p>
        <div id="modal-audio-controls">
          <audio id="modal-audio" controls></audio>
        </div>
      </div>
    </div>

    <!-- Modal: crear pin -->
    <div id="new-pin-modal" class="modal hidden">
      <div class="modal-content">
        <button class="close-btn" onclick="closeNewPinForm()">✕</button>
        <h2>Nuevo recuerdo</h2>
        <input type="text" id="pin-title" placeholder="Título" />
        <textarea id="pin-desc" placeholder="Descripción..."></textarea>
        <label>Foto: <input type="file" id="pin-photo" accept="image/*" /></label>
        <label>Audio (subir archivo):
          <input type="file" id="pin-audio-file" accept="audio/*" />
        </label>
        <div id="record-controls">
          <button id="record-btn" onclick="handleRecord()">Grabar audio</button>
          <span id="record-status"></span>
        </div>
        <button id="save-pin-btn" onclick="handleSavePin()">Guardar recuerdo</button>
      </div>
    </div>
  </div>

  <!-- Librerías -->
  <script src="https://unpkg.com/globe.gl"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <!-- App -->
  <script src="js/globe.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Inicializar globo
    initGlobe("globe-container");

    // TODO: implementar login/register UI
    // Una vez logueado, cargar pins:
    // fetchAllPins();
  </script>
</body>
</html>
